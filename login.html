<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Halaman Masuk - Dashboard Operasional Internal CV Cahaya Nuklida Persada">
    <title>COS - Masuk Sistem</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0F172A;
            --secondary: #475569;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --bg-page: #F8FAFC;
            --bg-card: rgba(255, 255, 255, 0.7);
            --border: #E2E8F0;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --text-secondary: #64748B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #EEF2F6 0%, #E2E8F0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            z-index: 1;
            filter: blur(80px);
            opacity: 0.5;
        }

        body::before {
            background-color: #3B82F6;
            top: -50px;
            left: -50px;
        }

        body::after {
            background-color: #60A5FA;
            bottom: -50px;
            right: -50px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            padding: 40px 32px;
            z-index: 10;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--accent);
            color: #FFFFFF;
            border-radius: var(--radius-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .brand-header h2 {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .brand-header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Tabs styling */
        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            gap: 16px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: color 0.2s ease;
        }

        .tab-btn.active {
            color: var(--accent);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent);
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px 10px 38px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background-color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            color: var(--primary);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .alert-error {
            background-color: #FEF2F2;
            border: 1px solid #FCA5A5;
            color: #991B1B;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Brand Header -->
        <header class="brand-header">
            <div class="brand-logo">C</div>
            <h2>COS Operational</h2>
            <p>Sistem Informasi CV Cahaya Nuklida Persada</p>
        </header>

        <!-- Tabs -->
        <div class="tabs-header">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Masuk (Log In)</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Daftar Akun Baru</button>
        </div>

        <!-- Alert Container -->
        <div id="alert-error" class="alert-error">
            <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
            <span id="alert-message">Terjadi kesalahan</span>
        </div>

        <!-- LOGIN FORM -->
        <div class="form-panel active" id="panel-login">
            <form id="form-login">
                <div class="form-group">
                    <label for="login-email">Alamat Email Kerja</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="login-email" class="form-input" placeholder="nama@rebahan.shop" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Kata Sandi (Password)</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit-login">
                    Masuk Sekarang <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
                </button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-panel" id="panel-register">
            <form id="form-register">
                <div class="form-group">
                    <label for="reg-fullname">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="reg-fullname" class="form-input" placeholder="Contoh: Supriyanto Pratama" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-role">Jabatan / Peran Operasional</label>
                    <div class="input-wrapper">
                        <i data-lucide="briefcase" class="input-icon"></i>
                        <select id="reg-role" class="form-select" required>
                            <option value="Supervisor AUR">Supervisor AUR (Akses Penuh)</option>
                            <option value="Admin Gudang">Admin Gudang (PO & Terima Alat)</option>
                            <option value="Teknisi Lab">Teknisi Lab (Inspeksi & Kalibrasi)</option>
                            <option value="Logistik">Logistik (Pengemasan & JNE)</option>
                            <option value="Finance">Finance (Billing & Invoice)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-email">Alamat Email Kerja</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="reg-email" class="form-input" placeholder="nama@rebahan.shop" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-password">Kata Sandi (Min. 6 Karakter)</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="reg-password" class="form-input" placeholder="••••••••" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit-register">
                    Daftar & Masuk <i data-lucide="user-plus" style="width:16px;height:16px;"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Supabase and Auth Logic Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // Init Lucide
        lucide.createIcons();

        // Check if Supabase configured
        const supabaseLib = window.supabase || window.Supabase;
        let supabaseClient = null;

        if (supabaseLib && typeof SUPABASE_URL !== "undefined" && typeof SUPABASE_ANON_KEY !== "undefined" && SUPABASE_URL.trim() !== "" && !SUPABASE_URL.includes("ganti-dengan")) {
            supabaseClient = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // Check if user is already logged in
        async function checkLoggedIn() {
            if (supabaseClient) {
                const { data } = await supabaseClient.auth.getSession();
                if (data.session) {
                    window.location.href = "index.html";
                }
            }
        }
        checkLoggedIn();

        // Switch Tabs
        function switchTab(tabType) {
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            document.querySelectorAll(".form-panel").forEach(p => p.classList.remove("active"));
            document.getElementById("alert-error").style.display = "none";

            if (tabType === 'login') {
                document.getElementById("tab-login").classList.add("active");
                document.getElementById("panel-login").classList.add("active");
            } else {
                document.getElementById("tab-register").classList.add("active");
                document.getElementById("panel-register").classList.add("active");
            }
        }

        // Show Error Alert
        function showError(message) {
            const container = document.getElementById("alert-error");
            const msgSpan = document.getElementById("alert-message");
            msgSpan.textContent = message;
            container.style.display = "flex";
        }

        // Handle Login Submission
        document.getElementById("form-login").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const btn = document.getElementById("btn-submit-login");

            document.getElementById("alert-error").style.display = "none";

            if (!supabaseClient) {
                // Static Fallback Mode
                alert("Supabase tidak terhubung. Membuat sesi simulasi...");
                localStorage.setItem("mock_session", JSON.stringify({
                    user_metadata: {
                        full_name: "Supriyanto Pratama (Simulasi)",
                        role: "Supervisor AUR"
                    }
                }));
                window.location.href = "index.html";
                return;
            }

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" style="width:16px;height:16px;"></i> Memproses...`;
            lucide.createIcons();

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;
                window.location.href = "index.html";
            } catch (err) {
                console.error(err);
                showError(err.message || "Gagal masuk. Periksa kembali email dan password.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        });

        // Handle Register Submission
        document.getElementById("form-register").addEventListener("submit", async (e) => {
            e.preventDefault();
            const fullName = document.getElementById("reg-fullname").value;
            const role = document.getElementById("reg-role").value;
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-password").value;
            const btn = document.getElementById("btn-submit-register");

            document.getElementById("alert-error").style.display = "none";

            if (!supabaseClient) {
                alert("Supabase tidak terhubung. Membuat sesi simulasi...");
                localStorage.setItem("mock_session", JSON.stringify({
                    user_metadata: {
                        full_name: fullName,
                        role: role
                    }
                }));
                window.location.href = "index.html";
                return;
            }

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" style="width:16px;height:16px;"></i> Mendaftar...`;
            lucide.createIcons();

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: role
                        }
                    }
                });

                if (error) throw error;
                
                // Supabase returns a session if confirm email is disabled
                if (data.session) {
                    window.location.href = "index.html";
                } else {
                    // Fallback alert if email confirmation is still active
                    alert("Pendaftaran berhasil! Silakan periksa kotak masuk email Anda untuk mengonfirmasi akun sebelum masuk.");
                    switchTab('login');
                }
            } catch (err) {
                console.error(err);
                showError(err.message || "Gagal mendaftar. Silakan coba lagi.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
